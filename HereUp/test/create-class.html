<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <link rel="icon" type="image/png" href="../../public/favicon.ico">
        <title>Sign-Up | Here Up</title>

        <!-- Tailwind CSS -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

        <!-- Lucide Icons -->
        <script src="https://unpkg.com/lucide@latest"></script>
    </head> 
    <body>
        <div class="mx-auto my-[61px] flex flex-col items-center justify-center w-[500px] border-[2px] border-[#DEE1E6] rounded-md">

            <!-- Icon and Title -->
            <div class="flex items-center justify-between gap-5 mb-[10px]">
                <img class="h-[35px] mt-[54px]" src="../public/images/icon.png" alt="Icon">
                <h1 class="text-[30px] mt-13 text-[#87CEEB] font-archivo font-bold">Create Class</h1>
            </div>
            <p class="text-[#565D6D] mb-[47px]">Here is Where Your Journey Begins</p>

            <form class="space-y-3 w-full max-w-sm mx-auto" action="../controllers/SignupController.php" method="POST" novalidate>

                <!-- Class Name -->
                <label for="class_name" class="block text-sm font-medium text-[#565D6D]">Class Name</label>
                <div class="relative">
                    <input
                        type="text"
                        id="class_name"
                        name="class_name"
                        placeholder="create a class name"
                        class="block w-full rounded border border-[#DEE1E6] py-2 pl-10 pr-3 placeholder-[#91959C] focus:border-[#87CEEB] focus:ring-1 focus:ring-[#87CEEB] focus:outline-none"
                    />
                    <i data-lucide="user" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-[#91959C]" stroke-width="2"></i>
                </div>
                <p id="error-class_name" class="hidden text-sm text-red-400 font-inter"></p>

                <!-- Description -->
                <label for="description" class="block text-sm font-medium text-[#565D6D]">Description</label>
                <div class="relative">
                    <input
                        type="text"
                        id="description"
                        name="description"
                        placeholder="describe your class"
                        class="block w-full rounded border border-[#DEE1E6] py-2 pl-10 pr-3 placeholder-[#91959C] focus:border-[#87CEEB] focus:ring-1 focus:ring-[#87CEEB] focus:outline-none"
                    />
                    <i data-lucide="file-text" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-[#91959C]" stroke-width="2"></i>
                </div>
                <p id="error-description" class="hidden text-sm text-red-400 font-inter"></p>

                <!-- Select Mode -->
                <label for="mode" class="block text-sm font-medium text-[#565D6D]">Select Mode</label>
                <div class="relative">
                    <select
                        id="mode"
                        name="mode"
                        class="block w-full rounded border border-[#DEE1E6] py-2 pl-10 pr-3 placeholder-[#91959C] focus:border-[#87CEEB] focus:ring-1 focus:ring-[#87CEEB] focus:outline-none"
                    >
                        <option value="" disabled selected>What Mode do you prefer?</option>
                        <option value=1>Admin Only</option>
                        <option value=2>Member Participation</option>
                        <option value=3>QR Code</option>
                    </select>
                    <i data-lucide="blend" class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-[#91959C]" stroke-width="2"></i>
                </div>
                <p id="error-mode" class="hidden text-sm text-red-400 font-inter"></p>

                <div class="flex flex-col sm:flex-row items-center gap-4 mb-[54px] mt-[32px]">
                    <button type="submit" class="w-full sm:flex-[2] py-4 text-white font-bold rounded-2xl bg-gradient-to-r from-[#7B61FF] via-[#3BC5BA] to-[#5D87E8] shadow-lg shadow-blue-200 hover:opacity-90 transition-all active:scale-[0.98]">
                        Create New Class
                    </button>
                    
                    <button type="reset" class="w-full sm:flex-1 py-4 bg-white border border-slate-200 rounded-2xl flex items-center justify-center gap-2 text-slate-600 font-semibold hover:bg-slate-50 transition-all active:scale-[0.98]">
                        <i data-lucide="rotate-ccw" class="w-4 h-4"></i>
                        <span>Reset</span>
                    </button>
                </div>
            </form>
        </div>

        <!-- Initialize Lucide Icons -->
        <script>lucide.createIcons();</script>
    </body>
</html>
